<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>TM Capture — Select a Drive file</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  html, body {
    height: 100%;
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #f6f7f9;
    color: #1e2761;
  }
  .wrap {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 24px;
    box-sizing: border-box;
  }
  .spinner {
    width: 28px;
    height: 28px;
    border: 3px solid #d7dbe6;
    border-top-color: #2563eb;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  h1 { font-size: 16px; margin: 0 0 4px; }
  p { font-size: 13px; color: #64748b; margin: 0; max-width: 360px; }
  .error { color: #b91c1c; }
</style>
</head>
<body>
  <div class="wrap" id="wrap">
    <div class="spinner" id="spinner"></div>
    <h1 id="title">Opening Google Drive picker…</h1>
    <p id="message">This window will close automatically once you pick a file.</p>
  </div>

<script>
  // This page exists only because Manifest V3 Chrome extensions cannot load
  // remote scripts (like Google's Picker library) inside extension pages —
  // Chrome enforces that at the platform level. So TM Capture opens this
  // page (hosted on GitHub Pages, a normal HTTPS origin) in a popup, passing
  // in an OAuth access token it already obtained itself via
  // chrome.identity.getAuthToken. We use that SAME token to drive the
  // Picker here, rather than letting the Picker do its own separate sign-in —
  // that way the file-selection grant (drive.file scope) lines up with the
  // exact OAuth identity the extension will use afterwards to actually read
  // the file's content via the Docs/Slides/Sheets APIs. Once the user picks
  // (or cancels), we report the result back to the extension with
  // chrome.runtime.sendMessage and close ourselves.

  const params = new URLSearchParams(window.location.search);
  const token = params.get("token");
  const apiKey = params.get("key");
  const appId = params.get("appId") || "";
  const extId = params.get("extId");

  const titleEl = document.getElementById("title");
  const messageEl = document.getElementById("message");
  const spinnerEl = document.getElementById("spinner");

  function showError(text) {
    spinnerEl.style.display = "none";
    titleEl.textContent = "Something went wrong";
    titleEl.classList.add("error");
    messageEl.textContent = text;
  }

  function reportResult(payload) {
    if (!extId) {
      showError("Missing extension ID — can't report the result back.");
      return;
    }
    try {
      chrome.runtime.sendMessage(extId, payload, () => {
        // chrome.runtime.lastError is expected/ignorable if the extension
        // side has already stopped listening (e.g. user closed the side
        // panel) — this page closes itself regardless.
        window.close();
      });
    } catch (e) {
      showError("Couldn't reach the extension: " + (e.message || e));
    }
  }

  function onPickerCallback(data) {
    if (data.action === google.picker.Action.PICKED) {
      const doc = data[google.picker.Response.DOCUMENTS][0];
      titleEl.textContent = "File selected";
      messageEl.textContent = doc.name;
      reportResult({
        type: "tmcapture-picker-result",
        status: "picked",
        doc: { id: doc.id, name: doc.name, mimeType: doc.mimeType, url: doc.url }
      });
    } else if (data.action === google.picker.Action.CANCEL) {
      titleEl.textContent = "Canceled";
      messageEl.textContent = "No file was selected.";
      reportResult({ type: "tmcapture-picker-result", status: "canceled" });
    }
  }

  function openPicker() {
    const docsView = new google.picker.DocsView(google.picker.ViewId.DOCS)
      .setIncludeFolders(true)
      .setSelectFolderEnabled(false);
    const recentView = new google.picker.DocsView(google.picker.ViewId.RECENTLY_PICKED);

    const builder = new google.picker.PickerBuilder()
      .setOAuthToken(token)
      .addView(recentView)
      .addView(docsView)
      .setCallback(onPickerCallback);

    if (apiKey) builder.setDeveloperKey(apiKey);
    if (appId) builder.setAppId(appId);

    builder.build().setVisible(true);
  }

  function onPickerApiLoad() {
    openPicker();
  }

  function onApiLoad() {
    gapi.load("picker", { callback: onPickerApiLoad });
  }

  if (!token || !apiKey || !extId) {
    showError("Missing required parameters (token/key/extension id). Please try again from the extension.");
  } else {
    const script = document.createElement("script");
    script.src = "https://apis.google.com/js/api.js";
    script.onload = onApiLoad;
    script.onerror = () => showError("Couldn't load Google's API library. Check your connection and try again.");
    document.head.appendChild(script);
  }
</script>
</body>
</html>
